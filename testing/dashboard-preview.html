<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSpeak Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cyber-blue': '#00f3ff',
                        'cyber-pink': '#ff006e',
                        'cyber-purple': '#8b5cf6'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes flash {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .flash-animation {
            animation: flash 0.8s ease-in-out;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-white p-8">
    <!-- Connection Status -->
    <div class="fixed top-4 right-4">
        <div id="connectionStatus" class="px-4 py-2 rounded-full text-sm font-semibold bg-red-500/20 text-red-400 border border-red-400">
            ● DISCONNECTED
        </div>
    </div>

    <!-- Word Display -->
    <div class="text-center my-12">
        <div id="wordDisplay" class="text-8xl font-bold text-cyber-blue" style="text-shadow: 0 0 20px rgba(0,243,255,0.8);">
            ---
        </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 gap-6 mt-8">
        <!-- Sensor 1 Chart -->
        <div class="glassmorphism rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4 text-cyber-blue">Sensor 1: Jaw/Back Ear</h3>
            <canvas id="chart1" height="100"></canvas>
        </div>

        <!-- Sensor 2 Chart -->
        <div class="glassmorphism rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4 text-cyber-pink">Sensor 2: Chin</h3>
            <canvas id="chart2" height="100"></canvas>
        </div>

        <!-- Sensor 3 Chart -->
        <div class="glassmorphism rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4 text-cyber-purple">Sensor 3: Temporal/Ear</h3>
            <canvas id="chart3" height="100"></canvas>
        </div>
    </div>

    <script>
        // Initialize Socket.io connection
        const socket = io('http://localhost:8000');
        
        // Connection status
        const statusEl = document.getElementById('connectionStatus');
        socket.on('connect', () => {
            console.log('Connected to backend');
            statusEl.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-green-500/20 text-green-400 border border-green-400';
            statusEl.textContent = '● CONNECTED';
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected from backend');
            statusEl.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-red-500/20 text-red-400 border border-red-400';
            statusEl.textContent = '● DISCONNECTED';
        });

        // Word display
        const wordEl = document.getElementById('wordDisplay');
        socket.on('word_detected', (data) => {
            console.log('Word detected:', data.word);
            wordEl.textContent = data.word;
            wordEl.classList.add('flash-animation');
            setTimeout(() => {
                wordEl.classList.remove('flash-animation');
            }, 800);
        });

        // Chart setup
        const chartConfig = (color) => ({
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: color,
                    borderWidth: 2,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: {
                        display: false
                    },
                    y: {
                        min: 0,
                        max: 4095,
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        },
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.5)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        const chart1 = new Chart(document.getElementById('chart1'), chartConfig('#00f3ff'));
        const chart2 = new Chart(document.getElementById('chart2'), chartConfig('#ff006e'));
        const chart3 = new Chart(document.getElementById('chart3'), chartConfig('#8b5cf6'));

        const MAX_POINTS = 150; // 5 seconds at 30Hz

        // EMG data handler
        socket.on('emg_data', (data) => {
            const timestamp = Date.now();
            
            // Update chart 1
            chart1.data.labels.push(timestamp);
            chart1.data.datasets[0].data.push(data.v1);
            if (chart1.data.labels.length > MAX_POINTS) {
                chart1.data.labels.shift();
                chart1.data.datasets[0].data.shift();
            }
            chart1.update('none');
            
            // Update chart 2
            chart2.data.labels.push(timestamp);
            chart2.data.datasets[0].data.push(data.v2);
            if (chart2.data.labels.length > MAX_POINTS) {
                chart2.data.labels.shift();
                chart2.data.datasets[0].data.shift();
            }
            chart2.update('none');
            
            // Update chart 3
            chart3.data.labels.push(timestamp);
            chart3.data.datasets[0].data.push(data.v3);
            if (chart3.data.labels.length > MAX_POINTS) {
                chart3.data.labels.shift();
                chart3.data.datasets[0].data.shift();
            }
            chart3.update('none');
        });

        console.log('NeuroSpeak Dashboard initialized');
        console.log('Connecting to backend at http://localhost:8000');
    </script>
</body>
</html>
